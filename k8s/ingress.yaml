apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: talentmatch-ingress
spec:
  rules:
    - host: talentmatch.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: talentmatch-service
                port:
                  number: 80